<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi GPS Personal</title>
    <!-- Estilos de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #map {
            height: 70vh;
            width: 100%;
        }

        .controls {
            padding: 15px;
            background: #f8f9fa;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            font-weight: bold;
        }

            button:hover {
                background: #0056b3;
            }

        #saved-list {
            padding: 15px;
            border-top: 1px solid #ccc;
            max-height: 20vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <button onclick="centerMap()">🎯 Centrar mi posición</button>
        <button onclick="saveCurrentLocation()">📍 Guardar lugar actual</button>
    </div>

    <div id="saved-list">
        <h3>Lugares Guardados:</h3>
        <ul id="places"></ul>
    </div>

    <!-- Scripts de Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, userCoords;

        // 1. Inicializar el mapa
        function initMap() {
            // Coordenadas iniciales (por defecto)
            map = L.map('map').setView([0, 0], 15);

            // Cargar mosaicos de Google Maps (Callejero)
            L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: '© Google Maps'
            }).addTo(map);

            // Iniciar seguimiento de ubicación en tiempo real
            trackLocation();
        }

        // 2. Seguimiento actualizado frecuentemente (watchPosition)
        function trackLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    const { latitude, longitude } = position.coords;
                    userCoords = [latitude, longitude];

                    // Actualizar o crear marcador de posición actual
                    if (!marker) {
                        marker = L.marker(userCoords).addTo(map).bindPopup("Estás aquí").openPopup();
                        map.setView(userCoords, 15);
                    } else {
                        marker.setLatLng(userCoords);
                    }
                }, (err) => console.error("Error de GPS: ", err),
                    { enableHighAccuracy: true, timeout: 5000 });
            }
        }

        // 3. Función para centrar el mapa
        function centerMap() {
            if (userCoords) {
                map.panTo(userCoords);
            } else {
                alert("Esperando señal de GPS...");
            }
        }

        // 4. Función para guardar lugar
        function saveCurrentLocation() {
            if (!userCoords) return alert("Ubicación no disponible.");

            const name = prompt("Introduce un nombre para este lugar:");
            if (name) {
                const list = document.getElementById('places');
                const li = document.createElement('li');
                li.innerHTML = `<strong>${name}</strong>: ${userCoords[0].toFixed(5)}, ${userCoords[1].toFixed(5)}`;
                list.appendChild(li);

                // Añadir un marcador permanente en el lugar guardado
                L.marker(userCoords, { opacity: 0.7 }).addTo(map).bindPopup(name);
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
