<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Pro - Rutas</title>

    <!-- Leaflet CSS y JS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <!-- Leaflet Routing Machine (Para las rutas) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }

        /* Botones flotantes inferiores */
        .main-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 15px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .btn-center {
            background: #007bff;
        }

        .btn-save {
            background: #28a745;
        }

        .btn-sat {
            background: #fd7e14;
        }

        /* Panel Lateral de Lugares */
        #side-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 2000;
            transition: 0.3s;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

            #side-panel.open {
                right: 0;
            }

        .panel-header {
            padding: 15px;
            background: #333;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #places-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            list-style: none;
            margin: 0;
        }

        /* Items de la lista */
        .place-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .place-name {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .item-btns {
            display: flex;
            gap: 5px;
        }

        .btn-small {
            padding: 5px 8px;
            border: none;
            border-radius: 3px;
            color: white;
            font-size: 11px;
            cursor: pointer;
        }

        .btn-go {
            background: #007bff;
        }

        .btn-edit {
            background: #ffc107;
            color: black;
        }

        .btn-del {
            background: #dc3545;
        }

        /* Botón para abrir panel */
        .btn-open-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="btn-open-panel" onclick="togglePanel()">📂</button>

    <div id="map"></div>

    <div class="main-controls">
        <button class="btn btn-center" onclick="centerMap()">🎯</button>
        <button class="btn btn-save" onclick="saveLocation()">📍 Guardar</button>
        <button class="btn btn-sat" onclick="toggleMap()">🛰️</button>
    </div>

    <div id="side-panel">
        <div class="panel-header">
            <span>Mis Lugares</span>
            <button onclick="togglePanel()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
        </div>
        <ul id="places-list"></ul>
    </div>

    <script>
        let map, userMarker, userCoords, routingControl;
        let savedPlaces = JSON.parse(localStorage.getItem('gps_data')) || [];
        let isSatellite = false;

        const streetLayer = L.tileLayer('http://{s}://{x}&y={y}&z={z}', { subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });
        const satLayer = L.tileLayer('http://{s}://{x}&y={y}&z={z}', { subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(, 2);
            streetLayer.addTo(map);
            renderList();

            navigator.geolocation.watchPosition(pos => {
                userCoords = [pos.coords.latitude, pos.coords.longitude];
                if (!userMarker) {
                    userMarker = L.marker(userCoords).addTo(map).bindPopup("Tú");
                    map.setView(userCoords, 16);
                } else {
                    userMarker.setLatLng(userCoords);
                }
            }, null, { enableHighAccuracy: true });
        }

        function togglePanel() { document.getElementById('side-panel').classList.toggle('open'); }

        function toggleMap() {
            if (isSatellite) { map.removeLayer(satLayer); streetLayer.addTo(map); }
            else { map.removeLayer(streetLayer); satLayer.addTo(map); }
            isSatellite = !isSatellite;
        }

        function centerMap() { if (userCoords) map.panTo(userCoords); }

        function saveLocation() {
            if (!userCoords) return alert("Esperando señal GPS...");
            const name = prompt("Nombre del lugar:");
            if (name) {
                savedPlaces.push({ id: Date.now(), name, lat: userCoords, lng: userCoords });
                updateStorage();
            }
        }

        function renderList() {
            const list = document.getElementById('places-list');
            list.innerHTML = "";
            savedPlaces.forEach(p => {
                const li = document.createElement('li');
                li.className = 'place-item';
                li.innerHTML = `
                        <span class="place-name">${p.name}</span>
                        <div class="item-btns">
                            <button class="btn-small btn-go" onclick="calculateRoute(${p.lat}, ${p.lng})">Ir</button>
                            <button class="btn-small btn-edit" onclick="editPlace(${p.id})">✎</button>
                            <button class="btn-small btn-del" onclick="deletePlace(${p.id})">🗑</button>
                        </div>
                    `;
                list.appendChild(li);
            });
        }

        function calculateRoute(destLat, destLng) {
            if (!userCoords) return alert("No hay posición GPS.");
            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(userCoords), L.latLng(destLat, destLng)],
                routeWhileDragging: false,
                language: 'es',
                createMarker: () => null // No crear marcadores extra
            }).addTo(map);
            togglePanel();
        }

        function editPlace(id) {
            const place = savedPlaces.find(p => p.id === id);
            const newName = prompt("Nuevo nombre:", place.name);
            if (newName) {
                place.name = newName;
                updateStorage();
            }
        }

        function deletePlace(id) {
            if (confirm("¿Eliminar este lugar permanentemente?")) {
                savedPlaces = savedPlaces.filter(p => p.id !== id);
                updateStorage();
            }
        }

        function updateStorage() {
            localStorage.setItem('gps_data', JSON.stringify(savedPlaces));
            renderList();
        }

        window.onload = initMap;
    </script>
</body>
</html>
