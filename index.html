<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Microbús Pro</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        /* IMPORTANTE: El mapa DEBE tener altura fija o 100% */
        #map { height: 70vh; width: 100%; background: #ddd; }
        .controls { height: 10vh; padding: 10px; background: #333; display: flex; gap: 10px; align-items: center; justify-content: center; }
        .controls button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; background: #ffcc00; font-weight: bold; }
        #lista-lugares { height: 20vh; overflow-y: auto; background: white; border-top: 2px solid #333; }
        .lugar-item { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .lugar-item.seleccionado { background-color: #fff3cd; border-left: 5px solid #ffcc00; }
        .btn-group button { margin-left: 4px; padding: 5px; font-size: 11px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="controls">
    <button onclick="centrarMapa()">📍 Centrar</button>
    <button onclick="guardarLugar()">⭐ Guardar Aquí</button>
</div>
<div id="lista-lugares"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com"></script>

<script>
    let map, userMarker, routingControl;
    let currentPos = null;
    let sitiosGuardados = JSON.parse(localStorage.getItem('sitios_gps')) || [];
    let seleccionadosParaRuta = [];

    // Icono de Microbús (Asegúrate de tener conexión a internet para cargarlo)
    const busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com',
        iconSize: [40, 40],
        iconAnchor: [20, 40]
    });

    function init() {
        // Inicializar mapa en una posición por defecto (Bogotá como ejemplo)
        map = L.map('map').setView([4.6097, -74.0817], 15);

        // Capa de Google Maps (Satelital/Híbrida)
        const googleLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '© Google Maps'
        });

        // Capa de respaldo (OpenStreetMap) por si Google falla
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        });

        googleLayer.addTo(map);

        // Activar GPS
        map.locate({ setView: true, watch: true, enableHighAccuracy: true });

        map.on('locationfound', (e) => {
            currentPos = e.latlng;
            if (!userMarker) {
                userMarker = L.marker(e.latlng, { icon: busIcon }).addTo(map).bindPopup("Estás aquí");
            } else {
                userMarker.setLatLng(e.latlng);
            }
        });

        map.on('locationerror', () => alert("No se pudo obtener tu ubicación GPS. Revisa los permisos."));

        // Ocultar nombres al alejar zoom
        map.on('zoomend', () => {
            const zoom = map.getZoom();
            document.querySelectorAll('.leaflet-tooltip').forEach(t => {
                t.style.display = zoom < 15 ? 'none' : 'block';
            });
        });

        renderizarLista();
    }

    function centrarMapa() {
        if (currentPos) map.flyTo(currentPos, 18);
        else alert("Buscando señal GPS...");
    }

    function guardarLugar() {
        if (!currentPos) return alert("Esperando señal GPS...");
        const nombre = prompt("Nombre para este lugar:");
        if (nombre) {
            const nuevoSitio = { id: Date.now(), nombre, lat: currentPos.lat, lng: currentPos.lng };
            sitiosGuardados.push(nuevoSitio);
            localStorage.setItem('sitios_gps', JSON.stringify(sitiosGuardados));
            renderizarLista();
        }
    }

    function renderizarLista() {
        const contenedor = document.getElementById('lista-lugares');
        contenedor.innerHTML = '';
        
        // Limpiar marcadores antiguos
        map.eachLayer(layer => { 
            if (layer instanceof L.Marker && layer !== userMarker) map.removeLayer(layer); 
        });

        sitiosGuardados.forEach(sitio => {
            // Marcador en mapa
            L.marker([sitio.lat, sitio.lng])
                .addTo(map)
                .bindTooltip(sitio.nombre, { permanent: true, direction: 'top', className: 'map-label' });

            // Elemento en lista HTML
            const item = document.createElement('div');
            item.className = 'lugar-item';
            item.innerHTML = `
                <span><strong>${sitio.nombre}</strong></span>
                <div class="btn-group">
                    <button onclick="irASitio(${sitio.lat}, ${sitio.lng})">Ir</button>
                    <button onclick="editarSitio(${sitio.id})">✏️</button>
                    <button onclick="eliminarSitio(${sitio.id})" style="background:#ff4444; color:white;">X</button>
                </div>
            `;
            item.onclick = (e) => {
                if(e.target.tagName !== 'BUTTON') seleccionarDosPuntos(sitio, item);
            };
            contenedor.appendChild(item);
        });
    }

    function irASitio(lat, lng) {
        if (!currentPos) return alert("No tengo tu ubicación actual");
        trazarRuta(currentPos, L.latLng(lat, lng));
    }

    function seleccionarDosPuntos(sitio, elemento) {
        if (seleccionadosParaRuta.includes(sitio)) return;
        
        elemento.classList.add('seleccionado');
        seleccionadosParaRuta.push(sitio);

        if (seleccionadosParaRuta.length === 2) {
            const p1 = L.latLng(seleccionadosParaRuta[0].lat, seleccionadosParaRuta[0].lng);
            const p2 = L.latLng(seleccionadosParaRuta[1].lat, seleccionadosParaRuta[1].lng);
            trazarRuta(p1, p2);
            
            // Limpiar selección tras 3 segundos
            setTimeout(() => {
                seleccionadosParaRuta = [];
                renderizarLista();
            }, 3000);
        }
    }

    function trazarRuta(inicio, fin) {
        if (routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            waypoints: [inicio, fin],
            lineOptions: { styles: [{ color: '#007bff', weight: 6 }] },
            createMarker: () => null, // No duplicar marcadores
            language: 'es'
        }).on('routeselected', (e) => {
            const r = e.route.summary;
            alert(`Ruta: ${(r.totalDistance/1000).toFixed(1)} km | Aprox: ${Math.round(r.totalTime/60)} min`);
        }).addTo(map);
    }

    function editarSitio(id) {
        const index = sitiosGuardados.findIndex(s => s.id === id);
        const nuevo = prompt("Nuevo nombre:", sitiosGuardados[index].nombre);
        if (nuevo) {
            sitiosGuardados[index].nombre = nuevo;
            localStorage.setItem('sitios_gps', JSON.stringify(sitiosGuardados));
            renderizarLista();
        }
    }

    function eliminarSitio(id) {
        if (confirm("¿Eliminar este lugar permanentemente?")) {
            sitiosGuardados = sitiosGuardados.filter(s => s.id !== id);
            localStorage.setItem('sitios_gps', JSON.stringify(sitiosGuardados));
            renderizarLista();
        }
    }

    window.onload = init;
</script>
</body>
</html>
