<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi GPS Web</title>
    <!-- Cargamos CSS de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 80vh; width: 100%; }
        .controls { padding: 10px; background: #f4f4f4; display: flex; gap: 10px; }
        #saved-places { padding: 10px; border-top: 1px solid #ccc; height: 15vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="centerMap()">Centrar Mi Posición</button>
        <button onclick="saveCurrentLocation()">Guardar Lugar Actual</button>
    </div>

    <div id="map"></div>
    <div id="saved-places"><strong>Lugares Guardados:</strong><ul id="places-list"></ul></div>

    <!-- Cargamos JS de Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, userMarker, currentCoords;

        // 1. Inicializar el mapa
        function initMap() {
            map = L.map('map').setView([0, 0], 15);

            // Capa de Google Maps (Mosaicos)
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: 'Google Maps'
            }).addTo(map);

            // Iniciar seguimiento GPS
            trackLocation();
        }

        // 2. Seguimiento frecuente con watchPosition
        function trackLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(function(pos) {
                    currentCoords = [pos.coords.latitude, pos.coords.longitude];
                    
                    if (!userMarker) {
                        userMarker = L.marker(currentCoords).addTo(map).bindPopup("Estás aquí").openPopup();
                        map.setView(currentCoords, 15);
                    } else {
                        userMarker.setLatLng(currentCoords);
                    }
                }, function(err) {
                    console.error("Error GPS: ", err);
                }, { enableHighAccuracy: true });
            }
        }

        // 3. Botón para centrar
        function centerMap() {
            if (currentCoords) {
                map.panTo(currentCoords);
            }
        }

        // 4. Guardar lugar con nombre y coordenadas
        function saveCurrentLocation() {
            if (!currentCoords) return alert("Ubicación no disponible.");
            
            const name = prompt("Escribe un nombre para este lugar:");
            if (name) {
                const list = document.getElementById('places-list');
                const li = document.createElement('li');
                li.innerHTML = `<strong>${name}</strong>: ${currentCoords[0].toFixed(5)}, ${currentCoords[1].toFixed(5)}`;
                list.appendChild(li);
                
                // Añadir un marcador permanente en el lugar guardado
                L.marker(currentCoords).addTo(map).bindPopup(name);
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
